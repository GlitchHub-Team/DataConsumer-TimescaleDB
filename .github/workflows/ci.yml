name: CI

on:
  push:
    branches:
      - main
      - issue-*

permissions:
  contents: read

jobs:
  validate:
    runs-on: self-hosted
    env:
      NATS_HOST: ${{ vars.NATS_HOST }}
      NATS_PORT: ${{ vars.NATS_PORT }}
      NATS_HTTP_PORT: ${{ vars.NATS_HTTP_PORT }}
      NATS_ENCRYPTION_KEY: ${{ secrets.NATS_ENCRYPTION_KEY }}
      NATS_SYS_ACCOUNT_ID: ${{ vars.NATS_SYS_ACCOUNT_ID }}
      NATS_SENSOR_DATA_CORE_ID: ${{ vars.NATS_SENSOR_DATA_CORE_ID }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DATA_CONSUMER_CREDS_PATH: data_consumer.creds
      DATA_CONSUMER_TEST_CREDS_PATH: admin_test.creds
      DATA_CONSUMER_CA_PEM_PATH: ca.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Go tools
        shell: bash
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Init integration credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.DATA_CONSUMER_CREDS }}" ]; then
            echo "::error::Missing secret DATA_CONSUMER_CREDS"
            exit 1
          fi

          if [ -z "${{ secrets.DATA_CONSUMER_TEST_CREDS }}" ]; then
            echo "::error::Missing secret DATA_CONSUMER_TEST_CREDS"
            exit 1
          fi

          if [ -z "${{ secrets.NATS_STREAM_SETUPPER_CREDS }}" ]; then
            echo "::error::Missing secret NATS_STREAM_SETUPPER_CREDS"
            exit 1
          fi

          mkdir -p cmd

          printf '%s\n' "${{ secrets.DATA_CONSUMER_CREDS }}" > cmd/data_consumer.creds

          printf '%s\n' "${{ secrets.DATA_CONSUMER_TEST_CREDS }}" > cmd/admin_test.creds

          mkdir -p .devcontainer/natsManager
          printf '%s\n' "${{ secrets.NATS_STREAM_SETUPPER_CREDS }}" > .devcontainer/natsManager/stream_setupper.creds

          chmod 600 cmd/data_consumer.creds cmd/admin_test.creds
          chmod 600 .devcontainer/natsManager/stream_setupper.creds

          if [ ! -f .devcontainer/nats/certs/server.key ]; then
            if [ -z "${{ secrets.NATS_SERVER_TLS_KEY }}" ]; then
              echo "::error::Missing secret NATS_SERVER_TLS_KEY (required when .devcontainer/nats/certs/server.key is not committed)"
              exit 1
            fi

            mkdir -p .devcontainer/nats/certs
            printf '%s\n' "${{ secrets.NATS_SERVER_TLS_KEY }}" > .devcontainer/nats/certs/server.key
            chmod 600 .devcontainer/nats/certs/server.key
          fi

      - name: Start integration dependencies
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d
          echo "Attendendo il completamento del setup di NATS (nats-manager)..."

          docker wait $(docker compose ps -q nats-manager)

          EXIT_CODE=$(docker inspect $(docker compose ps -q nats-manager) --format='{{.State.ExitCode}}')
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "ERRORE: Il setup di NATS è fallito!"
            docker compose logs nats-manager
            exit 1
          fi

          echo "NATS Setup completato. Avvio dei test..."

      - name: Go checks (root module)
        shell: bash
        run: |
          set -euo pipefail
          gofumpt -w .
          golangci-lint run
          go test ./...
          cd cmd
          go build .

      - name: Stop integration dependencies
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.yml down -v
          elif docker info >/dev/null 2>&1 && command -v docker-compose >/dev/null 2>&1; then
            docker-compose -f docker-compose.yml down -v
          elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker compose version >/dev/null 2>&1; then
            sudo -n docker compose -f docker-compose.yml down -v
          elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
            sudo -n docker-compose -f docker-compose.yml down -v
          fi
