name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - issue-*

permissions:
  contents: read

jobs:
  validate:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Go tools
        shell: bash
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Go checks (root module)
        shell: bash
        run: |
          set -euo pipefail
          go mod download
          gofumpt -w .
          golangci-lint run
          go test ./...
          cd cmd
          go build .