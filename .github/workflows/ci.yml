name: CI

on:
  push:
    branches:
      - main
      - issue-*

permissions:
  contents: read

jobs:
  validate:
    runs-on: self-hosted
    env:
      NATS_HOST: 127.0.0.1
      NATS_PORT: 4222
      NATS_HTTP_PORT: 8222
      NATS_ENCRYPTION_KEY: ci-jetstream-encryption-key
      NATS_SYS_ACCOUNT_ID: AC5AETGQDNAASOGOYEEGZHHWTN72U7WYHBXMNZLHHNZWVPWFCDU5VUXT
      NATS_SENSOR_DATA_CORE_ID: ABNX2H755JMKLS5YQQNFLH4B7FJH4UUIEBHKV2Y7PVC4PQU47IN6U2OO
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: sensor_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      DATA_CONSUMER_CREDS_PATH: data_consumer.creds
      DATA_CONSUMER_TEST_CREDS_PATH: admin_test.creds
      DATA_CONSUMER_CA_PEM_PATH: ca.pem

    steps:
      - name: Fix permissions for cleanup
        run: |
          sudo chown -R $(whoami):$(whoami) .
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Go tools
        shell: bash
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Init integration credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.DATA_CONSUMER_CREDS }}" ]; then
            echo "::error::Missing secret DATA_CONSUMER_CREDS"
            exit 1
          fi

          if [ -z "${{ secrets.DATA_CONSUMER_TEST_CREDS }}" ]; then
            echo "::error::Missing secret DATA_CONSUMER_TEST_CREDS"
            exit 1
          fi

          if [ -z "${{ secrets.NATS_STREAM_SETUPPER_CREDS }}" ]; then
            echo "::error::Missing secret NATS_STREAM_SETUPPER_CREDS"
            exit 1
          fi

          mkdir -p cmd

          printf '%s\n' "${{ secrets.DATA_CONSUMER_CREDS }}" > cmd/data_consumer.creds

          printf '%s\n' "${{ secrets.DATA_CONSUMER_TEST_CREDS }}" > cmd/admin_test.creds

          mkdir -p .devcontainer/natsManager
          printf '%s\n' "${{ secrets.NATS_STREAM_SETUPPER_CREDS }}" > .devcontainer/natsManager/stream_setupper.creds

          chmod 600 cmd/data_consumer.creds cmd/admin_test.creds
          chmod 600 .devcontainer/natsManager/stream_setupper.creds

          if [ ! -f .devcontainer/nats/certs/server.key ]; then
            if [ -z "${{ secrets.NATS_SERVER_TLS_KEY }}" ]; then
              echo "::error::Missing secret NATS_SERVER_TLS_KEY (required when .devcontainer/nats/certs/server.key is not committed)"
              exit 1
            fi

            mkdir -p .devcontainer/nats/certs
            printf '%s\n' "${{ secrets.NATS_SERVER_TLS_KEY }}" > .devcontainer/nats/certs/server.key
            chmod 600 .devcontainer/nats/certs/server.key
          fi

      - name: Start integration dependencies
        shell: bash
        run: |
          set -euo pipefail

          if docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          elif docker info >/dev/null 2>&1 && command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="sudo -n docker compose"
          elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
            COMPOSE_CMD="sudo -n docker-compose"
          else
            echo "::error::Docker is unavailable for the runner user. Configure docker group permissions or passwordless sudo for docker/docker-compose."
            id
            groups
            exit 1
          fi

          $COMPOSE_CMD -f .github/docker-compose.ci.yml up -d nats timescale

          for _ in $(seq 1 45); do
            if $COMPOSE_CMD -f .github/docker-compose.ci.yml exec -T timescale pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 45); do
            if (echo > /dev/tcp/127.0.0.1/"$NATS_PORT") >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! (echo > /dev/tcp/127.0.0.1/"$NATS_PORT") >/dev/null 2>&1; then
            echo "::error::NATS is not reachable on 127.0.0.1:$NATS_PORT"
            $COMPOSE_CMD -f .github/docker-compose.ci.yml ps
            exit 1
          fi

          $COMPOSE_CMD -f .github/docker-compose.ci.yml run --rm nats-manager

      - name: Go checks (root module)
        shell: bash
        run: |
          set -euo pipefail
          gofumpt -w .
          golangci-lint run
          go test ./...
          cd cmd
          go build .

      - name: Stop integration dependencies
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            docker compose -f .github/docker-compose.ci.yml down -v
          elif docker info >/dev/null 2>&1 && command -v docker-compose >/dev/null 2>&1; then
            docker-compose -f .github/docker-compose.ci.yml down -v
          elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker compose version >/dev/null 2>&1; then
            sudo -n docker compose -f .github/docker-compose.ci.yml down -v
          elif sudo -n docker info >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
            sudo -n docker-compose -f .github/docker-compose.ci.yml down -v
          fi
