services:
  data-consumer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    user: vscode
    volumes:
      - ..:/workspaces/${localWorkspaceFolderBasename}:cached
    command: sleep infinity
    environment:
      DATA_CONSUMER_CREDS_PATH: data_consumer.creds
      DATA_CONSUMER_TEST_CREDS_PATH: admin_test.creds
      DATA_CONSUMER_CA_PEM_PATH: ca.pem
    depends_on:
      timescale:
        condition: service_healthy
      nats:
        condition: service_started

include:
  - path: ../Infrastructure/docker-compose.yml
